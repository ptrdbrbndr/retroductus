name: Deploy Mining Engine

on:
  push:
    branches: [master]
    paths:
      - 'engine/**'
      - '.github/workflows/deploy-engine.yml'

env:
  RAILWAY_SERVICE_ID: 2812d8b7-997f-466c-b17a-74040d2d9b37
  RAILWAY_ENVIRONMENT_ID: 6e08e330-cd1f-4f9d-adb9-1aaf32ce169d
  RAILWAY_PROJECT_ID: 38a52c94-cbc6-4ca3-af2b-6bf1c40676a3

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy engine to Railway
        working-directory: ./engine
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ env.RAILWAY_PROJECT_ID }} --environment ${{ env.RAILWAY_ENVIRONMENT_ID }} --service ${{ env.RAILWAY_SERVICE_ID }}
          railway up --detach
          echo "Deployment triggered"
